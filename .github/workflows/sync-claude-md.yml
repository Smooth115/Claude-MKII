name: Sync CLAUDE.md

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9 AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync CLAUDE.md
        uses: EtK2000/CLAUDE.md-sync@v1
        with:
          source-repo: EtK2000/CLAUDE.md
